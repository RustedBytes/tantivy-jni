name: Release iOS

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to build, for example 0.1.0 or 0.1.0-rc1"
        required: true

permissions:
  contents: write

concurrency:
  group: release-ios-${{ github.ref }}
  cancel-in-progress: false

jobs:
  swift-ios:
    name: Build Swift XCFramework
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve Release Version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            RELEASE_VERSION="${GITHUB_REF_NAME#v}"
            RELEASE_TAG_NAME="${GITHUB_REF_NAME//\//-}"
          else
            RELEASE_VERSION="${{ inputs.version }}"
            RELEASE_VERSION="${RELEASE_VERSION#v}"
            RELEASE_TAG_NAME="v${RELEASE_VERSION}"
          fi
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "${GITHUB_ENV}"
          echo "RELEASE_TAG_NAME=${RELEASE_TAG_NAME}" >> "${GITHUB_ENV}"

      - name: Verify Release Version
        run: scripts/verify-release-version.sh "$RELEASE_VERSION"

      - name: Set Up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
          components: clippy, rustfmt
          targets: >-
            aarch64-apple-ios,
            aarch64-apple-ios-sim,
            x86_64-apple-ios,
            aarch64-apple-darwin,
            x86_64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Rust Format
        run: cargo fmt --check

      - name: Rust Test
        run: cargo test

      - name: Rust Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build XCFramework
        run: scripts/build-ios-native.sh

      - name: Swift Build
        working-directory: tantivy-ios
        run: swift build

      - name: Swift Test (macOS slice)
        working-directory: tantivy-ios
        run: swift test

      - name: Package XCFramework
        run: |
          set -euo pipefail
          mkdir -p dist
          ARCHIVE="dist/TantivyFFI-${RELEASE_TAG_NAME}.xcframework.zip"
          # ditto is Apple's recommended way to zip an xcframework for
          # distribution as a Swift binaryTarget.
          ditto -c -k --sequesterRsrc --keepParent \
            tantivy-ios/TantivyFFI.xcframework "$ARCHIVE"

          # Publish the SwiftPM checksum so consumers can pin a remote
          # binaryTarget(url:checksum:) against this release asset.
          CHECKSUM="$(swift package --package-path tantivy-ios compute-checksum "$ARCHIVE")"
          echo "$CHECKSUM" > "${ARCHIVE}.checksum.txt"

          {
            echo "TantivyFFI ${RELEASE_TAG_NAME}"
            echo "swift package compute-checksum: ${CHECKSUM}"
            echo
            echo "Swift binaryTarget snippet:"
            echo ".binaryTarget("
            echo "    name: \"CTantivyFFI\","
            echo "    url: \"https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG_NAME}/$(basename "$ARCHIVE")\","
            echo "    checksum: \"${CHECKSUM}\""
            echo ")"
          } > "dist/TantivyFFI-${RELEASE_TAG_NAME}-binaryTarget.txt"

      - name: Generate Checksums
        run: sha256sum dist/* > "dist/checksums-ios-${RELEASE_TAG_NAME}.txt"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: tantivy-jni-ios-${{ env.RELEASE_TAG_NAME }}
          path: dist/*
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG_NAME }}
          files: dist/*
          generate_release_notes: true
