name: Android Instrumentation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/android-instrumentation.yml"
      - "sample-app/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "scripts/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/wrapper/**"
      - "gradlew"
      - "gradlew.bat"
      - "tantivy-android/**"
  push:
    paths:
      - ".github/workflows/android-instrumentation.yml"
      - "sample-app/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "scripts/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/wrapper/**"
      - "gradlew"
      - "gradlew.bat"
      - "tantivy-android/**"

concurrency:
  group: android-instrumentation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_NDK_VERSION: "27.2.12479018"
  ANDROID_ABIS: "x86_64"

jobs:
  connected-test:
    name: Connected JNI Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set Up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Set Up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set Up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools" "emulator"
          sdkmanager "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "${GITHUB_ENV}"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build JNI Libraries
        run: scripts/build-android-native.sh

      - name: Verify JNI Libraries
        run: scripts/verify-android-native.sh

      - name: Build Consumer Sample With JNI
        run: ./gradlew :sample-app:assembleRelease

      - name: Run Connected Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          arch: x86_64
          target: google_apis
          script: ./gradlew :tantivy-android:connectedDebugAndroidTest :sample-app:connectedDebugAndroidTest
