name: Swift iOS

on:
  workflow_dispatch:

concurrency:
  group: ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build XCFramework And Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
          targets: >-
            aarch64-apple-ios,
            aarch64-apple-ios-sim,
            x86_64-apple-ios,
            aarch64-apple-darwin,
            x86_64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build XCFramework
        run: scripts/build-ios-native.sh

      - name: Swift Build
        working-directory: tantivy-ios
        run: swift build

      - name: Swift Test (macOS slice)
        working-directory: tantivy-ios
        run: swift test

      - name: Build For iOS Simulator
        working-directory: tantivy-ios
        run: |
          xcodebuild build \
            -scheme TantivyKit \
            -destination 'generic/platform=iOS Simulator'
